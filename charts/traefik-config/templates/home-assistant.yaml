apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`home-assistant.parkiki.org`)
      priority: 10
      services:
        - name: home-assistant
          port: 8080
  tls:
    certResolver: letsencrypt
    domains:
      - main: "parkiki.org"
        sans:
          - "*.parkiki.org"
