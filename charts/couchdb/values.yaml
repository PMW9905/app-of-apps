couchdb:
  clusterSize: 1

  createAdminSecret: false
  existingSecret: couchdb-credentials

  couchdbConfig:
    couchdb:
      uuid: your-uuid-here

  persistentVolume:
    enabled: true
    existingClaims:
      - volumeName: database-storage
        claimName: couchdb-pvc
        persistentVolumeName: couchdb-pv
        volumeSource: {}
