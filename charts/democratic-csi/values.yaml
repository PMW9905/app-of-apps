democratic-csi:
  csiDriver:
    name: "org.democratic-csi.freenas-api-iscsi"

  storageClasses:
    - name: truenas-iscsi
      defaultClass: true
      reclaimPolicy: Delete
      volumeBindingMode: Immediate
      allowVolumeExpansion: true
      parameters:
        fsType: ext4

  controller:
    driver:
      image:
        tag: next

  driver:
    existingConfigSecret: democratic-csi-driver-config
